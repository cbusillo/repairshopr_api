---
name: Deploy to Dokploy

"on":
  workflow_run:
    workflows:
      - Test Suite
    types:
      - completed
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: dokploy-deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy cm-repairshopr-sync
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'

    steps:
      - name: Deploy tested commit to Dokploy
        env:
          DOKPLOY_HOST: ${{ secrets.DOKPLOY_HOST }}
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
          DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
          GITHUB_TOKEN: ${{ github.token }}
          DEPLOY_BRANCH: dokploy-deploy
          GITHUB_REPOSITORY: ${{ github.repository }}
          TESTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          required_env="DOKPLOY_HOST DOKPLOY_TOKEN DOKPLOY_COMPOSE_ID"
          required_env="$required_env GITHUB_TOKEN GITHUB_REPOSITORY"
          required_env="$required_env DEPLOY_BRANCH TESTED_SHA"
          for name in $required_env; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required secret: ${name}" >&2
              exit 1
            fi
          done

          host="${DOKPLOY_HOST%/}"
          repo_api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}"

          dokploy_get() {
            curl --fail --show-error --silent \
              --header "x-api-key: ${DOKPLOY_TOKEN}" \
              "$1"
          }

          dokploy_post() {
            response=$(curl --fail --show-error --silent \
              --request POST \
              --header "Content-Type: application/json" \
              --header "x-api-key: ${DOKPLOY_TOKEN}" \
              --data "$2" \
              "$1")

            if jq -e '
              type == "object" and (
                .success == false or
                has("error") or
                has("errors")
              )
            ' <<< "$response" >/dev/null; then
              echo "Dokploy write failed: ${response}" >&2
              return 1
            fi

            printf '%s' "$response"
          }

          github_request() {
            curl --show-error --silent \
              --request "$1" \
              --header "Authorization: Bearer ${GITHUB_TOKEN}" \
              --header "Accept: application/vnd.github+json" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              --data "$3" \
              --write-out "\n%{http_code}" \
              "$2"
          }

          update_deploy_branch() {
            update_payload=$(jq -n \
              --arg sha "$TESTED_SHA" \
              '{sha: $sha, force: true}')

            response=$(github_request PATCH \
              "${repo_api_url}/git/refs/heads/${DEPLOY_BRANCH}" \
              "$update_payload")
            http_status=$(tail -n 1 <<< "$response")
            response_body=$(sed '$d' <<< "$response")

            case "$http_status" in
              200|201|204)
                return
                ;;
              404)
                create_payload=$(jq -n \
                  --arg ref "refs/heads/${DEPLOY_BRANCH}" \
                  --arg sha "$TESTED_SHA" \
                  '{ref: $ref, sha: $sha}')
                response=$(github_request POST \
                  "${repo_api_url}/git/refs" \
                  "$create_payload")
                http_status=$(tail -n 1 <<< "$response")
                response_body=$(sed '$d' <<< "$response")
                ;;
            esac

            case "$http_status" in
              200|201|204)
                return
                ;;
              *)
                echo "Could not update ${DEPLOY_BRANCH}: ${response_body}" >&2
                exit 1
                ;;
            esac
          }

          compose_url="${host}/api/compose.one?composeId=${DOKPLOY_COMPOSE_ID}"
          update_url="${host}/api/compose.update"
          deploy_url="${host}/api/compose.deploy"

          build_source_payload() {
            jq -c \
              --arg customGitBranch "$1" \
              '{
                composeId,
                name,
                environmentId,
                sourceType,
                autoDeploy,
                composePath,
                customGitUrl,
                customGitBranch: $customGitBranch,
                customGitSSHKeyId,
                enableSubmodules,
                triggerType,
                watchPaths
              }
              | with_entries(select(.value != null))'
          }

          update_deploy_branch

          restore_source_branch() {
            if [ -z "${original_branch:-}" ]; then
              return
            fi

            current_target=$(dokploy_get "$compose_url")
            restore_payload=$(build_source_payload "$original_branch" \
              <<< "$current_target")
            dokploy_post "$update_url" "$restore_payload" >/dev/null
          }

          target_payload=$(dokploy_get "$compose_url")
          original_branch=$(jq -r \
            '.customGitBranch // "main"' \
            <<< "$target_payload")
          original_branch=${original_branch:-main}
          trap restore_source_branch EXIT

          pinned_payload=$(build_source_payload "$DEPLOY_BRANCH" \
            <<< "$target_payload")
          dokploy_post "$update_url" "$pinned_payload" >/dev/null

          latest_before=$(dokploy_get "$compose_url" \
            | jq -r '[.deployments[]?]
              | sort_by(.createdAt)
              | last
              | (.deploymentId // .id // "")')

          payload=$(jq -n \
            --arg composeId "$DOKPLOY_COMPOSE_ID" \
            '{composeId: $composeId}')

          dokploy_post "$deploy_url" "$payload" >/dev/null

          for _ in $(seq 1 120); do
            latest=$(dokploy_get "$compose_url" \
              | jq -c '[.deployments[]?]
                | sort_by(.createdAt)
                | last
                | {
                  id: (.deploymentId // .id // ""),
                  status: (.status // ""),
                  title: (.title // ""),
                  finishedAt: (.finishedAt // null)
                }')
            deployment_id=$(jq -r '.id' <<< "$latest")
            deployment_status=$(jq -r '.status' <<< "$latest")

            if [ -z "$deployment_id" ] || \
              [ "$deployment_id" = "$latest_before" ]; then
              sleep 5
              continue
            fi

            case "$deployment_status" in
              done|success|succeeded|completed|finished|healthy)
                trap - EXIT
                if ! restore_source_branch; then
                  echo "::warning::Deploy succeeded; branch restore failed."
                fi
                exit 0
                ;;
              error|failed|failure|cancelled|canceled)
                echo "Dokploy deployment failed: ${latest}" >&2
                exit 1
                ;;
            esac

            sleep 5
          done

          echo "Timed out waiting for Dokploy deployment to finish." >&2
          exit 1
