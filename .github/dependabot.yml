---
version: 2

multi-ecosystem-groups:
  tooling:
    schedule:
      interval: weekly

updates:
  - package-ecosystem: pip
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: tooling
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - python
    groups:
      all-security-updates:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: "/docker"
    patterns:
      - "*"
    multi-ecosystem-group: tooling
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - docker
    groups:
      all-security-updates:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: tooling
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - github-actions
    groups:
      all-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
